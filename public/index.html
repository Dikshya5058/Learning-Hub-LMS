<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Admin Login</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; color: #333; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        h1 { color: #222; font-size: 2.2rem; text-align: center; margin-bottom: 10px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; }
        .login-card { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); width: 100%; max-width: 400px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 14px 15px; margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fcfcfc; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #3cb1c5; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #3cb1c5; }
    </style>
    
</head>
<body>
    <div class="navbar">
    </div>

    <div class="container">
        <h1>Welcome back to LMS</h1>
        <p class="subtitle">Login to continue your learning journey.</p>
        
        <div class="login-card">
            <h3 style="margin-top:0;">Admin Login</h3>
            
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="E-mail">

            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Password">

            <p id="loginError" style="color:red; font-size:13px;"></p>

            <button onclick="login()">Login</button>
            
        
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>
</html>
